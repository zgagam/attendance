<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>נוכחות עובדים — מוצרי בטון</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f2340 100%);font-family:'Segoe UI',Arial,sans-serif;color:#e2e8f0;direction:rtl}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:36px 30px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-logo{font-size:44px;text-align:center;margin-bottom:10px}
.login-title{text-align:center;font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:28px}
.login-label{font-size:13px;color:#94a3b8;margin-bottom:6px;display:block}
.login-input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:9px;color:#e2e8f0;font-size:15px;outline:none;direction:rtl;font-family:inherit;margin-bottom:14px}
.login-input:focus{border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.08)}
.btn-primary{width:100%;padding:12px;border-radius:9px;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;margin-bottom:8px}
.login-err{color:#f87171;font-size:13px;text-align:center;min-height:20px;margin-bottom:6px}
.role-tabs{display:flex;gap:8px;margin-bottom:20px}
.role-tab{flex:1;padding:10px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.1);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:rgba(255,255,255,0.04);color:#64748b;transition:all 0.2s;text-align:center}
.role-tab.active{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.5);color:#93c5fd}

/* HEADER */
.header{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);gap:8px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,0.4)}
.header-title{font-weight:700;font-size:15px;color:#f1f5f9}
.header-date{font-size:11px;color:#64748b;margin-top:1px}
.header-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:7px;padding:5px 11px;font-size:13px;color:#93c5fd;white-space:nowrap}
.badge strong{color:#60a5fa}
.nav-btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;transition:all 0.2s;background:rgba(255,255,255,0.06);color:#94a3b8;font-family:inherit}
.nav-btn.active{background:rgba(59,130,246,0.28);color:#93c5fd}
.logout-btn{padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:12px;background:transparent;color:#64748b;font-family:inherit}
.role-badge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:600}
.role-hr{background:rgba(168,85,247,0.2);color:#c084fc;border:1px solid rgba(168,85,247,0.3)}
.role-mgmt{background:rgba(59,130,246,0.2);color:#93c5fd;border:1px solid rgba(59,130,246,0.3)}

/* MAIN */
.main{padding:20px 16px;max-width:1100px;margin:0 auto}
.page{display:none}
.page.active{display:block}

/* DEPT GRID */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.dept-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.09);border-radius:13px;padding:15px;cursor:pointer;transition:all 0.18s;user-select:none}
.dept-card:hover{background:rgba(59,130,246,0.13);border-color:rgba(59,130,246,0.38);transform:translateY(-2px)}
.dept-name{font-weight:700;font-size:14px;color:#f1f5f9;margin-bottom:4px}
.dept-count{font-size:12px;color:#64748b;margin-bottom:9px}
.progress-bar{background:rgba(255,255,255,0.08);border-radius:4px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.dept-present{margin-top:7px;font-size:11px;color:#4ade80}
.dept-submitted{margin-top:4px;font-size:10px;color:#a78bfa}

/* EMPLOYEE PAGE */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#94a3b8;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px;flex-shrink:0;font-family:inherit}
.section-title{font-size:18px;font-weight:700;color:#f1f5f9}
.section-sub{font-size:12px;color:#64748b;margin-top:2px}
.controls{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.search-box{flex:1;min-width:150px;padding:9px 13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;direction:rtl;font-family:inherit}
.search-box::placeholder{color:#475569}
.filter-btn{padding:8px 12px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-size:12px;white-space:nowrap;background:rgba(255,255,255,0.06);color:#64748b;transition:all 0.15s;font-family:inherit}
.filter-btn.active-all{background:rgba(59,130,246,0.2);color:#93c5fd;border-color:rgba(59,130,246,0.4)}
.filter-btn.active-present{background:rgba(74,222,128,0.15);color:#4ade80;border-color:rgba(74,222,128,0.4)}
.filter-btn.active-absent{background:rgba(248,113,113,0.15);color:#f87171;border-color:rgba(248,113,113,0.4)}
.action-btn-green{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:#4ade80;white-space:nowrap;font-family:inherit}
.action-btn-red{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;white-space:nowrap;font-family:inherit}
.big-progress{background:rgba(255,255,255,0.06);border-radius:6px;height:7px;margin-bottom:16px;overflow:hidden}
.big-progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#3b82f6,#4ade80);transition:width 0.4s ease}

/* SUBMIT PANEL */
.submit-panel{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:12px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.submit-info{font-size:13px;color:#93c5fd}
.submit-info span{font-size:11px;color:#64748b;display:block;margin-top:3px}
.submit-btn{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;white-space:nowrap;transition:all 0.2s;box-shadow:0 4px 14px rgba(59,130,246,0.35)}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px)}
.submit-btn.submitted{background:linear-gradient(135deg,#4ade80,#16a34a);box-shadow:0 4px 14px rgba(74,222,128,0.3)}
.last-submitted{font-size:11px;color:#4ade80;margin-top:4px}

/* EMP GRID */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:8px}
.emp-card{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:11px;padding:12px 13px;cursor:pointer;transition:all 0.14s;display:flex;align-items:center;gap:10px;user-select:none}
.emp-card.present{background:rgba(74,222,128,0.11);border-color:rgba(74,222,128,0.33)}
.emp-card:active{transform:scale(0.97)}
.emp-card.readonly{cursor:default;pointer-events:none}
.emp-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s}
.emp-card.present .emp-avatar{background:rgba(74,222,128,0.22);border-color:#4ade80}
.emp-info{flex:1;min-width:0}
.emp-name{font-weight:600;font-size:13px;color:#e2e8f0;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-card.present .emp-name{color:#bbf7d0}
.emp-id{font-size:10px;color:#475569}
.emp-status{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,0.06);color:#475569;flex-shrink:0}
.emp-card.present .emp-status{background:rgba(74,222,128,0.2);color:#4ade80}

/* HR SUMMARY */
.hr-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:26px;font-weight:800;color:#60a5fa}
.stat-label{font-size:12px;color:#64748b;margin-top:3px}
.stat-card.green .stat-num{color:#4ade80}
.stat-card.red .stat-num{color:#f87171}
.stat-card.purple .stat-num{color:#c084fc}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px}
.summary-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:15px 17px;cursor:pointer;transition:all 0.18s;position:relative}
.summary-card:hover{background:rgba(59,130,246,0.11);border-color:rgba(59,130,246,0.33)}
.summary-card.not-submitted{border-color:rgba(255,255,255,0.06);opacity:0.6}
.summary-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.summary-dept{font-weight:600;font-size:14px;color:#e2e8f0}
.summary-pct{font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px}
.pct-green{color:#4ade80;background:rgba(74,222,128,0.12)}
.pct-yellow{color:#fbbf24;background:rgba(251,191,36,0.12)}
.pct-red{color:#f87171;background:rgba(248,113,113,0.12)}
.pct-gray{color:#64748b;background:rgba(255,255,255,0.06)}
.summary-sub{margin-top:7px;font-size:11px;color:#64748b}
.submitted-tag{font-size:10px;color:#a78bfa;margin-top:5px}
.pending-tag{font-size:10px;color:#64748b;margin-top:5px}

.empty{text-align:center;color:#475569;padding:40px 0;font-size:14px;grid-column:1/-1}

/* HR Actions */
.hr-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.btn-close-day{padding:11px 22px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;white-space:nowrap;box-shadow:0 4px 14px rgba(245,158,11,0.35);transition:all 0.2s}
.btn-close-day:hover{opacity:0.9;transform:translateY(-1px)}
.btn-close-day.closed{background:linear-gradient(135deg,#64748b,#475569);box-shadow:none;cursor:default}
.btn-excel{padding:11px 22px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;white-space:nowrap;box-shadow:0 4px 14px rgba(22,163,74,0.35);transition:all 0.2s}
.btn-excel:hover{opacity:0.9;transform:translateY(-1px)}
.day-closed-banner{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:#fbbf24;display:none}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid rgba(74,222,128,0.4);border-radius:10px;padding:12px 22px;font-size:14px;color:#4ade80;z-index:9999;transition:transform 0.3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .header{padding:10px 12px}
  .main{padding:13px 10px}
  .emp-grid{grid-template-columns:1fr 1fr;gap:6px}
  .dept-grid{grid-template-columns:1fr 1fr}
  .summary-grid{grid-template-columns:1fr}
  .header-title{font-size:13px}
  .badge{font-size:12px;padding:4px 9px}
  .submit-panel{flex-direction:column;align-items:flex-start}
}
@media(max-width:360px){.emp-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏗️</div>
    <div class="login-title">מוצרי בטון</div>
    <div class="login-sub">מערכת נוכחות עובדים</div>

    <label class="login-label">שם משתמש</label>
    <input class="login-input" type="text" id="userInput" placeholder="הכנס שם משתמש" onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()"/>
    <label class="login-label" style="margin-top:4px">סיסמה</label>
    <input class="login-input" type="password" id="pwInput" placeholder="הכנס סיסמה" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-primary" onclick="doLogin()">כניסה</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="logo">🏗️</div>
      <div>
        <div class="header-title">מוצרי בטון — נוכחות</div>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>
    <div class="header-right">
      <span class="role-badge" id="roleBadge"></span>
      <div class="badge">נוכחים: <strong id="totalPresent">0</strong> / <span id="totalEmp">0</span></div>
      <button class="nav-btn active" id="btnDepts"   onclick="showPage('dept')">📋 מחלקות</button>
      <button class="nav-btn"        id="btnSummary" onclick="showPage('summary')">📊 סיכום</button>
      <button class="logout-btn" onclick="logout()">יציאה</button>
    </div>
  </div>

  <div class="main">

    <!-- DEPTS -->
    <div class="page active" id="pageDept">
      <div style="font-size:18px;font-weight:700;margin-bottom:5px;color:#f1f5f9;">בחר מחלקה</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px;" id="deptSubtitle"></div>
      <div class="dept-grid" id="deptGrid"></div>
    </div>

    <!-- EMPLOYEES -->
    <div class="page" id="pageEmp">
      <div class="section-header">
        <button class="back-btn" onclick="showPage('dept')">← חזרה</button>
        <div>
          <div class="section-title" id="empDeptTitle"></div>
          <div class="section-sub"  id="empDeptSub"></div>
        </div>
      </div>

      <!-- Submit panel (manager only) -->
      <div class="submit-panel" id="submitPanel">
        <div class="submit-info">
          שלח את דוח הנוכחות למנהלת משאבי האנוש
          <span id="lastSubmittedLabel"></span>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitReport()">📤 שלח דוח</button>
      </div>

      <div id="empControls">
        <div class="controls">
          <input class="search-box" id="searchBox" type="text" placeholder="חיפוש שם או מס׳ עובד..." oninput="renderEmployees()"/>
          <button class="filter-btn active-all" id="fAll"     onclick="setFilter('all')">הכל</button>
          <button class="filter-btn" id="fPresent" onclick="setFilter('present')">✓ נוכחים</button>
          <button class="filter-btn" id="fAbsent"  onclick="setFilter('absent')">✗ נעדרים</button>
          <button class="action-btn-green" onclick="markAll(true)">סמן הכל</button>
          <button class="action-btn-red"   onclick="markAll(false)">נקה הכל</button>
        </div>
      </div>
      <div class="big-progress"><div class="big-progress-fill" id="deptProgressBar" style="width:0%"></div></div>
      <div class="emp-grid" id="empGrid"></div>
    </div>

    <!-- SUMMARY -->
    <div class="page" id="pageSummary">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px;color:#f1f5f9;">📊 סיכום נוכחות</div>
      <div id="hrActionsPanel" style="display:none">
        <div class="day-closed-banner" id="dayClosedBanner">🔒 יום העבודה נסגר — לא ניתן לבצע שינויים נוספים</div>
        <div class="hr-actions">
          <button class="btn-close-day" id="btnCloseDay" onclick="closeDay()">🔒 סגירת יום עבודה</button>
          <button class="btn-excel" onclick="exportExcel()">📥 הורד דוח Excel</button>
        </div>
      </div>
      <div id="hrStatsPanel" style="display:none">
        <div class="hr-stats" id="hrStats"></div>
        <div style="font-size:13px;color:#64748b;margin-bottom:12px;">
          מחלקות שלא שלחו דוח מוצגות עם אפור ⟵ מחלקות עם נוכחות נמוכה מוצגות ראשון
        </div>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  databaseURL: "https://attendance-2026-207e3-default-rtdb.firebaseio.com",

};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

async function storageGet(key) {
  try {
    const snap = await db.ref(key).get();
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.error('FB get error', e); return null; }
}
async function storageSet(key, val) {
  try { await db.ref(key).set(val); } catch(e) { console.error('FB set error', e); }
}

let attendance   = {};

// ── Storage keys ──────────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10); // YYYY-MM-DD
const KEY_SUBMITTED = () => `data/${today()}/submitted`;
const KEY_DRAFT     = () => `data/${today()}/draft`;
const KEY_DAYCLOSED = () => `data/${today()}/dayClosed`;

let _listener = null;

async function loadData() {
  submitted   = (await storageGet(KEY_SUBMITTED())) || {};
  attendance  = (await storageGet(KEY_DRAFT()))     || {};
  dayClosedAt = (await storageGet(KEY_DAYCLOSED())) || null;
  // Real-time listener for submitted reports
  if (_listener) db.ref(KEY_SUBMITTED()).off('value', _listener);
  _listener = db.ref(KEY_SUBMITTED()).on('value', snap => {
    submitted = snap.val() || {};
    renderDepts();
    if (document.getElementById('pageSummary').classList.contains('active')) renderSummary();
    updateTotalBadge();
  });
}

async function saveDraft() { await storageSet(KEY_DRAFT(), attendance); }
async function saveSubmitted() { await storageSet(KEY_SUBMITTED(), submitted); }
async function saveDayClosed(ts) { await storageSet(KEY_DAYCLOSED(), ts); }

// ── Login ─────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const username = (document.getElementById('userInput').value || '').trim();
  const pw       = document.getElementById('pwInput').value;
  const user     = USERS[username];
  if (!user) { document.getElementById('loginErr').textContent = 'שם משתמש לא קיים'; return; }
  if (pw !== PASSWORDS[user.role]) { document.getElementById('loginErr').textContent = 'סיסמה שגויה'; return; }
  currentRole = user.role;
  currentDept = user.dept;
  await loadData();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';
  const rb = document.getElementById('roleBadge');
  rb.textContent = currentRole === 'hr' ? '👩‍💼 משאבי אנוש' : `👷 ${currentDept}`;
  rb.className   = 'role-badge ' + (currentRole === 'hr' ? 'role-hr' : 'role-mgmt');
  if (currentRole === 'hr') {
    document.getElementById('submitPanel').style.display  = 'block';
    document.getElementById('empControls').style.display  = 'block';
    document.getElementById('hrStatsPanel').style.display = 'block';
    document.getElementById('hrActionsPanel').style.display = 'block';
  }
  document.getElementById('totalEmp').textContent = EMPLOYEES.length;
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  renderDepts();
  updateTotalBadge();
  // מנהל מחלקה - פתח ישירות את המחלקה שלו
  if (currentRole === 'manager' && currentDept) {
    openDept(currentDept);
  }
};

  document.getElementById('pwInput').value = '';

// ── Helpers ───────────────────────────────────────────────────────────────
function getDeptStats(dept, useSubmitted = false) {
  const emps = EMPLOYEES.filter(e => e.department === dept);
  if (useSubmitted && submitted[dept]) {
    const s = submitted[dept];
    const pct = emps.length ? Math.round(s.present / emps.length * 100) : 0;
    return { total: emps.length, present: s.present, pct, isSubmitted: true, time: s.time };
  }
  const present = emps.filter(e => attendance[e.id]).length;
  const pct = emps.length ? Math.round(present / emps.length * 100) : 0;
  return { total: emps.length, present, pct, isSubmitted: false };
}
function pctColor(pct) { return pct>=80?'#4ade80':pct>=50?'#fbbf24':pct>0?'#60a5fa':'rgba(255,255,255,0.2)'; }
function pctClass(pct) { return pct>=80?'pct-green':pct>=50?'pct-yellow':'pct-red'; }
function timeStr(iso) { return iso ? new Date(iso).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : ''; }

function updateTotalBadge() {
  const present = Object.values(attendance).filter(Boolean).length;
  document.getElementById('totalPresent').textContent = present;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Pages ─────────────────────────────────────────────────────────────────
window.showPage = function(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+page.charAt(0).toUpperCase()+page.slice(1)).classList.add('active');
  document.getElementById('btnDepts').classList.toggle('active',   page==='dept');
  document.getElementById('btnSummary').classList.toggle('active', page==='summary');
  if (page==='dept')    renderDepts();
  if (page==='summary') renderSummary();
  if (page==='emp')     renderEmployees();
};

// ── Dept page ─────────────────────────────────────────────────────────────
function renderDepts() {
  document.getElementById('deptSubtitle').textContent =
    `${DEPARTMENTS.length} מחלקות · ${EMPLOYEES.length} עובדים`;
  const isHR = currentRole === 'hr';
  const visibleDepts = isHR ? DEPARTMENTS : DEPARTMENTS.filter(d => d === currentDept);
  document.getElementById('deptGrid').innerHTML = visibleDepts.map(dept => {
    const stats = getDeptStats(dept, isHR);
    const sub   = isHR && stats.isSubmitted
      ? `<div class="dept-submitted">📤 דווח ב-${timeStr(stats.time)}</div>`
      : stats.present > 0 ? `<div class="dept-present">✓ ${stats.present} מסומנים</div>` : '';
    return `<div class="dept-card" onclick="openDept('${dept.replace(/'/g,"\\'")}')">
      <div class="dept-name">${dept}</div>
      <div class="dept-count">${stats.total} עובדים</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${isHR&&stats.isSubmitted?stats.pct:getDeptStats(dept).pct}%;background:${pctColor(stats.pct)}"></div></div>
      ${sub}
    </div>`;
  }).join('');
}

window.openDept = function(dept) {
  currentDept = dept; filterStatus = 'all';
  const sb = document.getElementById('searchBox');
  if (sb) sb.value = '';
  document.getElementById('empDeptTitle').textContent = dept;
  showPage('emp');
};

// ── Employee page ─────────────────────────────────────────────────────────
window.renderEmployees = function() {
  if (!currentDept) return;
  const isHR = currentRole === 'hr';

  // Decide data source: HR always uses live attendance (can edit everything)
  let sourceData = attendance;
  let isReadonly = false;
  if (isHR && submitted[currentDept]) {
    sourceData = submitted[currentDept].attendance || {};
    // HR can still edit - merge submitted into attendance if not already set
    Object.keys(sourceData).forEach(k => {
      if (attendance[k] === undefined) attendance[k] = sourceData[k];
    });
    sourceData = attendance;
  }

  const search = (document.getElementById('searchBox')?.value||'').trim().toLowerCase();
  let list = EMPLOYEES.filter(e => e.department === currentDept);
  if (search) list = list.filter(e =>
    (e.first_name+' '+e.last_name).toLowerCase().includes(search) || String(e.id).includes(search));
  if (filterStatus==='present') list = list.filter(e =>  sourceData[e.id]);
  if (filterStatus==='absent')  list = list.filter(e => !sourceData[e.id]);

  const deptEmps   = EMPLOYEES.filter(e => e.department === currentDept);
  const presentCnt = deptEmps.filter(e => sourceData[e.id]).length;
  const pct        = deptEmps.length ? Math.round(presentCnt/deptEmps.length*100) : 0;

  document.getElementById('empDeptSub').textContent = `${presentCnt} נוכחים מתוך ${deptEmps.length}`;
  document.getElementById('deptProgressBar').style.width = pct+'%';

  // Submit panel
  if (!isHR) {
    const sub = submitted[currentDept];
    const btn = document.getElementById('submitBtn');
    const lbl = document.getElementById('lastSubmittedLabel');
    if (sub) {
      btn.textContent = '✅ שלח שוב';
      btn.className   = 'submit-btn submitted';
      lbl.textContent = `דווח לאחרונה ב-${timeStr(sub.time)} · ${sub.present}/${deptEmps.length} נוכחים`;
    } else {
      btn.textContent = '📤 שלח דוח';
      btn.className   = 'submit-btn';
      lbl.textContent = 'טרם נשלח דוח היום';
    }
  }

  const grid = document.getElementById('empGrid');
  if (!list.length) { grid.innerHTML = '<div class="empty">לא נמצאו עובדים</div>'; return; }
  grid.innerHTML = list.map(emp => {
    const present = !!sourceData[emp.id];
    return `<div class="emp-card ${present?'present':''} ${isReadonly?'readonly':''}"
      ${isReadonly?'':'onclick="toggleEmp('+emp.id+')"'}>
      <div class="emp-avatar">${present?'✓':''}</div>
      <div class="emp-info">
        <div class="emp-name">${emp.first_name} ${emp.last_name}</div>
        <div class="emp-id">מס׳ ${emp.id}</div>
      </div>
      <div class="emp-status">${present?'נוכח':'נעדר'}</div>
    </div>`;
  }).join('');
  updateTotalBadge();
};

window.toggleEmp = async function(id) {
  if (dayClosedAt && currentRole !== 'hr') { toast('⛔ יום העבודה נסגר'); return; }
  attendance[id] = !attendance[id];
  await saveDraft();
  renderEmployees();
};

window.setFilter = function(f) {
  filterStatus = f;
  ['All','Present','Absent'].forEach(x => {
    document.getElementById('f'+x).className =
      'filter-btn'+(f===x.toLowerCase()?' active-'+x.toLowerCase():'');
  });
  renderEmployees();
};

window.markAll = async function(val) {
  EMPLOYEES.filter(e=>e.department===currentDept).forEach(e=>{attendance[e.id]=val;});
  await saveDraft();
  renderEmployees();
};

// ── Submit ────────────────────────────────────────────────────────────────
window.submitReport = async function() {
  if (!currentDept) return;
  if (dayClosedAt) { toast('⛔ יום העבודה נסגר — לא ניתן לשלוח דוחות'); return; }
  const deptEmps = EMPLOYEES.filter(e=>e.department===currentDept);
  const snap = {};
  deptEmps.forEach(e=>{snap[e.id]=!!attendance[e.id];});
  const present = deptEmps.filter(e=>attendance[e.id]).length;
  submitted[currentDept] = {
    attendance: snap,
    present,
    total: deptEmps.length,
    time: new Date().toISOString()
  };
  await saveSubmitted();
  toast(`✅ דוח ${currentDept} נשלח (${present}/${deptEmps.length} נוכחים)`);
  renderEmployees();
  renderDepts();
};

// ── Close Day ─────────────────────────────────────────────────────────────
window.closeDay = async function() {
  if (dayClosedAt) { toast('היום כבר נסגר'); return; }
  const missing = DEPARTMENTS.filter(d => !submitted[d]);
  const msg = missing.length > 0
    ? `שים לב: ${missing.length} מחלקות טרם שלחו דוח.\nהאם לסגור את היום בכל זאת?`
    : 'האם לסגור את יום העבודה? לא ניתן יהיה לערוך לאחר מכן.';
  if (!confirm(msg)) return;
  dayClosedAt = new Date().toISOString();
  await saveDayClosed(dayClosedAt);
  const btn = document.getElementById('btnCloseDay');
  btn.textContent = `🔒 יום נסגר ב-${timeStr(dayClosedAt)}`;
  btn.classList.add('closed');
  btn.onclick = null;
  document.getElementById('dayClosedBanner').style.display = 'block';
  toast('🔒 יום העבודה נסגר בהצלחה');
};

// ── Export Excel ──────────────────────────────────────────────────────────
window.exportExcel = function() {
  const dateStr = new Date().toLocaleDateString('he-IL');
  // Build CSV with BOM for Hebrew support in Excel
  const rows = [['תאריך','מחלקה','מס׳ עובד','שם פרטי','שם משפחה','סטטוס','שעת דיווח']];
  DEPARTMENTS.forEach(dept => {
    const s = submitted[dept];
    const deptEmps = EMPLOYEES.filter(e => e.department === dept);
    deptEmps.forEach(emp => {
      const isPresent = s ? (s.attendance && s.attendance[emp.id]) : !!attendance[emp.id];
      const reportTime = s ? timeStr(s.time) : '';
      rows.push([
        dateStr,
        dept,
        emp.id,
        emp.first_name,
        emp.last_name,
        isPresent ? 'נוכח' : 'נעדר',
        reportTime
      ]);
    });
  });
  const csv = '\uFEFF' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `נוכחות_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 קובץ Excel הורד בהצלחה');
};

// ── Summary ───────────────────────────────────────────────────────────────
function renderSummary() {
  const isHR = currentRole === 'hr';
  if (isHR) {
    // Update close day button state
    const btn = document.getElementById('btnCloseDay');
    const banner = document.getElementById('dayClosedBanner');
    if (dayClosedAt) {
      btn.textContent = `🔒 יום נסגר ב-${timeStr(dayClosedAt)}`;
      btn.classList.add('closed');
      btn.onclick = null;
      banner.style.display = 'block';
    } else {
      btn.textContent = '🔒 סגירת יום עבודה';
      btn.classList.remove('closed');
      btn.onclick = closeDay;
      banner.style.display = 'none';
    }
    const submittedCount = Object.keys(submitted).length;
    let totalPresent = 0, totalAbsent = 0;
    DEPARTMENTS.forEach(d => {
      if (submitted[d]) { totalPresent += submitted[d].present; totalAbsent += submitted[d].total - submitted[d].present; }
    });
    document.getElementById('hrStats').innerHTML = `
      <div class="stat-card"><div class="stat-num">${EMPLOYEES.length}</div><div class="stat-label">סה"כ עובדים</div></div>
      <div class="stat-card green"><div class="stat-num">${totalPresent}</div><div class="stat-label">נוכחים (מדווח)</div></div>
      <div class="stat-card red"><div class="stat-num">${totalAbsent}</div><div class="stat-label">נעדרים (מדווח)</div></div>
      <div class="stat-card purple"><div class="stat-num">${submittedCount}/${DEPARTMENTS.length}</div><div class="stat-label">מחלקות דיווחו</div></div>
    `;
  }

  // Sort: HR sees submitted first (sorted by pct asc), then unsubmitted
  let sorted = DEPARTMENTS.map(dept => {
    const s = submitted[dept];
    const emps = EMPLOYEES.filter(e=>e.department===dept);
    if (isHR && s) {
      const pct = Math.round(s.present/emps.length*100);
      return { dept, total: emps.length, present: s.present, pct, isSubmitted: true, time: s.time };
    }
    const present = emps.filter(e=>attendance[e.id]).length;
    const pct = emps.length ? Math.round(present/emps.length*100) : 0;
    return { dept, total: emps.length, present, pct, isSubmitted: false };
  });

  if (isHR) {
    sorted.sort((a,b) => {
      if (a.isSubmitted !== b.isSubmitted) return a.isSubmitted ? -1 : 1;
      return a.pct - b.pct;
    });
  }

  document.getElementById('summaryGrid').innerHTML = sorted.map(({dept,total,present,pct,isSubmitted,time}) => {
    const cls   = isSubmitted ? pctClass(pct) : 'pct-gray';
    const color = isSubmitted ? pctColor(pct) : 'rgba(255,255,255,0.15)';
    const tag   = isHR
      ? (isSubmitted
          ? `<div class="submitted-tag">📤 דווח ב-${timeStr(time)}</div>`
          : `<div class="pending-tag">⏳ ממתין לדוח</div>`)
      : '';
    return `<div class="summary-card ${isHR&&!isSubmitted?'not-submitted':''}"
      onclick="openDept('${dept.replace(/'/g,"\\'")}')">
      <div class="summary-top">
        <div class="summary-dept">${dept}</div>
        <div class="summary-pct ${cls}">${isSubmitted||!isHR?pct+'%':'—'}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${isSubmitted||!isHR?pct:0}%;background:${color}"></div></div>
      <div class="summary-sub">${isSubmitted||!isHR?present+' נוכחים מתוך '+total:'טרם דווח'}</div>
      ${tag}
    </div>`;
  }).join('');
}
</script>
